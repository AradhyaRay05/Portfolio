<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aradhya Ray logo">
  <defs>
    <linearGradient id="bg" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35123F"/>
      <stop offset="0.55" stop-color="#241026"/>
      <stop offset="1" stop-color="#7621B0"/>
    </linearGradient>
    <linearGradient id="edge" x1="10" y1="8" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7E2EA" stop-opacity="0.34"/>
      <stop offset="0.55" stop-color="#B600A8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D7E2EA" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.71 0 1 0 0 0 0 0 1 0 0.82 0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="20" fill="#0C0C0C"/>
  <rect x="5" y="8" width="54" height="48" rx="24" fill="url(#bg)"/>
  <rect x="5.75" y="8.75" width="52.5" height="46.5" rx="23.25" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
  <text x="32" y="38" text-anchor="middle" filter="url(#glow)" fill="#F4F8FB" font-family="Kanit, Inter, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="5">AR</text>
</svg>
